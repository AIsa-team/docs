# ------------------------------------------------------------------
# Sync consolidated OpenAPI spec to the aisa-one website repo
#
# Triggers:
#   - Push to main that touches any file in openapi/
#   - Manual dispatch (workflow_dispatch)
#
# What it does:
#   1. Checks out this repo (AIsa-team/docs)
#   2. Runs scripts/consolidate_openapi.py to merge all individual
#      specs into a single openapi.yaml
#   3. Checks out the website repo (AIsa-team/new-style-landing-page)
#   4. Copies the new openapi.yaml into client/public/
#   5. Commits and pushes if there are changes
#   6. Sends a Slack notification with the result
#
# Required secrets:
#   LANDING_PAGE_PAT — a GitHub Personal Access Token with repo scope
#   for AIsa-team/new-style-landing-page
#   SLACK_WEBHOOK_URL — Slack incoming webhook for notifications
# ------------------------------------------------------------------

name: Sync OpenAPI Spec

on:
  push:
    branches: [main]
    paths:
      - "openapi/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-openapi:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ── 1. Checkout docs repo ──────────────────────────────────────
      - name: Checkout docs repo
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      # ── 3. Generate consolidated spec ──────────────────────────────
      - name: Consolidate OpenAPI specs
        id: consolidate
        run: |
          OUTPUT=$(python scripts/consolidate_openapi.py --output /tmp/openapi.yaml 2>&1)
          echo "$OUTPUT"
          echo "stats=$OUTPUT" >> "$GITHUB_OUTPUT"

      - name: Validate output
        run: |
          python -c "
          import yaml, sys
          with open('/tmp/openapi.yaml') as f:
              spec = yaml.safe_load(f)
          paths = len(spec['paths'])
          schemas = len(spec['components']['schemas'])
          print(f'Valid OpenAPI {spec[\"openapi\"]} — {paths} paths, {schemas} schemas')
          if paths < 50:
              print('ERROR: Too few paths, something went wrong')
              sys.exit(1)
          "

      # ── 4. Checkout website repo ───────────────────────────────────
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: AIsa-team/new-style-landing-page
          token: ${{ secrets.LANDING_PAGE_PAT }}
          path: website

      # ── 5. Copy and push if changed ────────────────────────────────
      - name: Copy spec to website repo
        run: cp /tmp/openapi.yaml website/client/public/openapi.yaml

      - name: Check for changes
        id: diff
        working-directory: website
        run: |
          git diff --quiet client/public/openapi.yaml && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        working-directory: website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/public/openapi.yaml
          git commit -m "chore: regenerate consolidated openapi.yaml

          Auto-generated by sync-openapi workflow from AIsa-team/docs.
          Triggered by: ${{ github.event_name }} on ${{ github.sha }}"
          git push

      - name: Summary
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "✅ openapi.yaml updated and pushed to AIsa-team/new-style-landing-page"
          else
            echo "ℹ️ No changes detected — openapi.yaml is already up to date"
          fi

      # ── 6. Slack notifications ─────────────────────────────────────
      - name: Notify Slack (spec updated)
        if: steps.diff.outputs.changed == 'true'
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ OpenAPI Spec Updated",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "The consolidated *openapi.yaml* has been regenerated and pushed to the website repo.\n\n• *Trigger:* `${{ github.event_name }}`\n• *Commit:* <https://github.com/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>\n• *Stats:* ${{ steps.consolidate.outputs.stats }}\n• *Workflow run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                  }
                }
              ]
            }

      - name: Notify Slack (no changes)
        if: steps.diff.outputs.changed == 'false'
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "ℹ️ OpenAPI sync ran — no changes detected. Spec is already up to date."
            }

      - name: Notify Slack (failure)
        if: failure()
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "⚠️ OpenAPI Sync Failed",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "The sync-openapi workflow failed.\n\n• *Workflow run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                  }
                }
              ]
            }
